services:
  - type: web
    name: cara-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        value: "*"
      - key: AUTH_MODE
        value: supabase
      - key: DB_DRIVER
        value: supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
