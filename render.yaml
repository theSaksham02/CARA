services:
  - type: web
    name: cara-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: "https://cara-eta-eosin.vercel.app,http://localhost:3000,http://localhost:5173"
      - key: AUTH_MODE
        value: bypass
      - key: DB_DRIVER
        value: supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

